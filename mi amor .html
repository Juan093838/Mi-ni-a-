<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Camila ❤️</title>

<style>
body{
    background: #0b1522;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* corazón real */
.heart{
    width: 320px;
    height: 300px;
    background: red;
    clip-path: path("M160 290 L30 150 A80 80 0 1 1 160 90 A80 80 0 1 1 290 150 Z");
    display: flex;
    justify-content: center;
    align-items: center;
    animation: latido 1s infinite;
    box-shadow: 0 0 40px #ff0040;
}

/* texto */
.texto{
    color: white;
    text-align: center;
    font-size: 18px;
    padding: 20px;
}

/* animación */
@keyframes latido{
    0%{ transform: scale(1); }
    50%{ transform: scale(1.1); }
    100%{ transform: scale(1); }
}
</style>
</head>

<body>

<div class="heart">
    <div class="texto">
        Camila ❤️ <br>
        Te amo mucho <br>
        Eres mi vida <br>
        Para siempre 💖
    </div>
</div>

</body>
</html>
